sonar.projectKey=angel-poc
sonar.organization=prontopaga-org
sonar.projectName=angel-poc
sonar.projectVersion=1.0.0

# Source
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions: dependencies, build output, generated files, config and scripts
sonar.exclusions=\
  node_modules/**,\
  public/**,\
  .cache/**,\
  static/**,\
  scripts/**,\
  gatsby-config.js,\
  **/*.min.js,\
  **/*.test.js,\
  **/*.spec.js,\
  **/coverage/**

# Coverage exclusions: test files, stories, mocks
sonar.coverage.exclusions=\
  **/*.test.js,\
  **/*.spec.js,\
  **/__tests__/**,\
  **/__mocks__/**

# Duplication exclusions: generated or boilerplate files
sonar.cpd.exclusions=\
  src/html.js
